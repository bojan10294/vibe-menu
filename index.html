<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Menu</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            width: 100%;
            background: #000;
        }

        body {
            display: grid;
            grid-template-columns: 1fr;
        }

        .menu-image {
            width: 100%;
            height: auto;
            display: block;
        }

        @media (min-width: 768px) {
            body {
                grid-template-columns: repeat(2, 1fr);
            }
        }
    </style>
</head>
<body>
    <img src="menu-1.jpg" alt="Menu" class="menu-image">
    <img src="menu-2.jpg" alt="Menu" class="menu-image">
    <img src="menu-3.jpg" alt="Menu" class="menu-image">
</body>
</html>
